[pytest]
# Pytest configuration for IT Support Agent

# Resolve `import backend.*` when running from `capstone_project/` (no manual PYTHONPATH)
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (moderate speed, multiple components)
    e2e: End-to-end tests (slower, full system)
    ai_quality: AI quality tests (may require API calls, slower)
    priority_p0: Critical priority tests
    priority_p1: High priority tests
    priority_p2: Medium priority tests
    priority_p3: Low priority tests
    slow: Tests that take significant time
    database: Tests that use database
    rag: Tests for RAG system
    agents: Tests for AI agents
    orchestration: Tests for orchestration and multi-agent coordination
    api: Tests for API endpoints
    mcp: Tests for MCP tools
    teaching: Teaching pipeline demo (isolated from production chat)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Coverage options (when running with --cov)
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
