// SVG NODES
// ═══════════════════════════════════════════════════════
function FlatNode({ id, x, y, w, h, rx=8, label, sub, bg, stroke, textCol, subCol, active, onSelect }) {
  const [hov, setHov] = useState(false);
  return (
    <g
      onClick={() => onSelect(id)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{ cursor: "pointer" }}
    >
      <rect
        x={x} y={y} width={w} height={h} rx={rx}
        fill={hov || active ? bg : "#fff"}
        stroke={stroke}
        strokeWidth={active ? 1.8 : hov ? 1.2 : 0.8}
      />
      <text
        x={x + w/2}
        y={sub ? y + h/2 - 7 : y + h/2}
        textAnchor="middle" dominantBaseline="central"
        fill={textCol} fontSize={12.5} fontWeight={600}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace"
      >
        {label}
      </text>
      {sub && (
        <text
          x={x + w/2} y={y + h/2 + 8}
          textAnchor="middle" dominantBaseline="central"
          fill={subCol} fontSize={10}
          fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace"
        >
          {sub}
        </text>
      )}
    </g>
  );
}

function ServerNode({ id, x, y, w, h, label, sub, tools, active, onSelect }) {
  const [hov, setHov] = useState(false);
  const cx = x + w/2;
  const lit = hov || active;
  return (
    <g
      onClick={() => onSelect(id)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{ cursor: "pointer" }}
    >
      <rect
        x={x} y={y} width={w} height={h} rx={8}
        fill={lit ? C.tBg : "#fff"}
        stroke={C.tStroke}
        strokeWidth={active ? 1.8 : hov ? 1.2 : 0.8}
      />
      <text
        x={cx} y={y+17} textAnchor="middle" dominantBaseline="central"
        fill={C.tText} fontSize={12} fontWeight={600}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace"
      >{label}</text>
      <text
        x={cx} y={y+30} textAnchor="middle" dominantBaseline="central"
        fill={C.tSub} fontSize={9.5}
        fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace"
      >{sub}</text>
      <line x1={x+10} y1={y+42} x2={x+w-10} y2={y+42}
        stroke={C.tStroke} strokeWidth={0.5} strokeOpacity={0.3}/>
      {tools.map((t,i) => (
        <text key={t} x={cx} y={y+55+i*14}
          textAnchor="middle" dominantBaseline="central"
          fill={C.tTool} fontSize={9.5} opacity={0.7}
          fontFamily="ui-monospace,SFMono-Regular,Menlo,monospace"
        >{t}</text>
      ))}
    </g>
  );
}

function Tag({ text, color }) {
  return (
    <span style={{
      display:"inline-block", fontSize:11, fontWeight:600,
      color, background:color+"18", border:`1px solid ${color}33`,
      borderRadius:4, padding:"2px 8px", margin:"0 4px 4px 0",
      fontFamily:"ui-monospace,monospace",
    }}>{text}</span>
  );
}

          fontFamily:"ui-monospace,monospace",

            display:"flex", alignItems:"center", justifyContent:"center",

      {/* Title */}

        {def.title}
      </h2>
      <p style={{ fontSize:11.5, color:"#64748b", margin:"0 0 16px",
        fontFamily:"ui-monospace,monospace" }}>
        {def.subtitle}
      </p>

      <p style={{ fontSize:13.5, color:"#374151", lineHeight:1.7, margin:0 }}>

                padding:"10px 12px", background:C.tBg,

      {def.examples && def.examples.length > 0 && (
        <div style={{ marginTop:20 }}>
          <p style={{ fontSize:10, fontWeight:700, letterSpacing:"0.1em",
            textTransform:"uppercase", color:"#94a3b8", marginBottom:8,
            fontFamily:"ui-monospace,monospace" }}>
            Examples
          </p>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {def.examples.map((e,i) => (
              <div key={i} style={{
                fontSize:12.5, color:"#374151", lineHeight:1.55,
                padding:"6px 12px", borderLeft:"3px solid #e2e8f0",
                fontFamily:"ui-monospace,monospace",
              }}>{e}</div>
            ))}
          </div>
        </div>
      )}


    </div>
  );
}
